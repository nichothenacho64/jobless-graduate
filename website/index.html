<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Homeless Graduate</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link href="styles.css" rel="stylesheet" />
        <script src="scripts/main.js" type="module" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
        <script src="https://cdn.plot.ly/plotly-3.4.0.js"></script>
    </head>
    <body>
        <h1>Homeless graduate</h1>
        <div class="chart-container">
            <div id="chart1aDegreeSupply" class="chart"></div>
        </div>
        <div class="chart-container">
            <div id="chart1bSkillByAge" class="chart"></div>
        </div>
        <div class="chart-container">
            <div id="chart2TransitionWindow" class="chart"></div>
        </div>
        <div class="chart-container">
            <div id="chart3SubgroupBottleneck" class="chart"></div>
        </div>
        <div class="chart-container">
            <div id="chart4GapShapes" class="chart"></div>
        </div>
        <div class="chart-container">
            <div id="chart5FieldConversion" class="chart"></div>
        </div>
        <div class="chart-container">
            <div id="chart6WorkFit" class="chart"></div>
        </div>
        <div class="chart-container">
            <div class="chart-7-panel">
                <div class="mb-3 chart-7-control">
                    <label id="chart7SelectorLabel" for="chart7DropdownButton" class="form-label"></label>
                    <div class="dropdown">
                        <button
                            id="chart7DropdownButton"
                            class="btn chart-7-dropdown-toggle dropdown-toggle"
                            type="button"
                            data-bs-toggle="dropdown"
                            aria-expanded="false"
                        ></button>
                        <ul id="chart7DropdownMenu" class="dropdown-menu chart-7-dropdown-menu"></ul>
                    </div>
                </div>
                <div class="align-items-start row g-3">
                    <div class="col-12 col-md-8">
                        <div id="chart7SubgroupComparator" class="chart chart-7-chart"></div>
                    </div>
                    <div class="col-12 col-md-4">
                        <aside id="chart7ExplanationCard" class="card chart-7-card"></aside>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
